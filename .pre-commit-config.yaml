default_install_hook_types:
  - pre-commit
  - pre-push
  - post-commit

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^server/fuzz/corpus/
      - id: end-of-file-fixer
        exclude: ^server/fuzz/corpus/
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        exclude: ^server/fuzz/corpus/
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: repo-typos
        name: typos
        entry: powershell -NoProfile -ExecutionPolicy Bypass -File server/scripts/quality.ps1 typos
        language: system
        pass_filenames: false
        files: \.(md|toml|ya?ml|json|rs|ps1|py)$

      - id: python-compile
        name: python compileall
        entry: python -m compileall rusaren_ops
        language: system
        pass_filenames: false
        files: ^rusaren_ops/.*\.py$

      - id: repo-taplo
        name: taplo
        entry: powershell -NoProfile -ExecutionPolicy Bypass -File server/scripts/quality.ps1 taplo
        language: system
        pass_filenames: false
        files: \.toml$

      - id: rust-fmt
        name: rust fmt
        entry: powershell -NoProfile -ExecutionPolicy Bypass -File server/scripts/quality.ps1 fmt
        language: system
        pass_filenames: false
        files: ^server/.*\.rs$

      - id: rust-fuzz
        name: rust ingress fuzz smoke
        entry: powershell -NoProfile -ExecutionPolicy Bypass -File server/scripts/quality.ps1 fuzz
        language: system
        pass_filenames: false
        files: ^server/(Cargo\.toml|Cargo\.lock|fuzz/|crates/(game_api|game_domain|game_net)/|scripts/(quality|install-tools)\.ps1)

      - id: rust-ci-guard
        name: rust ci guard
        entry: powershell -NoProfile -ExecutionPolicy Bypass -File server/scripts/pre-commit-ci-guard.ps1
        language: system
        pass_filenames: false
        files: ^server/(Cargo\.toml|Cargo\.lock|\.cargo/config\.toml|bin/.*\.rs|crates/.*\.rs|fuzz/.*\.rs)$

      - id: rust-lint
        name: rust lint
        entry: powershell -NoProfile -ExecutionPolicy Bypass -File server/scripts/quality.ps1 lint
        language: system
        pass_filenames: false
        files: ^server/
        stages:
          - pre-push

      - id: rust-test
        name: rust test
        entry: powershell -NoProfile -ExecutionPolicy Bypass -File server/scripts/quality.ps1 test
        language: system
        pass_filenames: false
        files: ^server/
        stages:
          - pre-push

      - id: server-reports
        name: server reports
        entry: powershell -NoProfile -ExecutionPolicy Bypass -File server/scripts/generate-reports.ps1
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - post-commit
