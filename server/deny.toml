[graph]
all-features = true

[advisories]
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
skip = [
  "bitflags@1.3.2",
  "getrandom@0.2.17",
  "getrandom@0.4.2",
  "r-efi@5.3.0",
  "rand_core@0.6.4",
  "socket2@0.5.10",
  "thiserror@1.0.69",
  "thiserror-impl@1.0.69",
  "windows-sys@0.52.0",
]

[licenses]
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
