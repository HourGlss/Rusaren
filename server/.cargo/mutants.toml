test_tool = "nextest"
test_workspace = true
copy_target = false
cap_lints = true
minimum_test_timeout = 20.0
timeout_multiplier = 1.5
build_timeout_multiplier = 2.0
output = "target/reports/mutants"
skip_calls_defaults = true

examine_globs = [
  # Keep the default mutation slice focused on gameplay, ingress, visibility,
  # protocol, and match-flow logic. Display-only formatter files stay out of
  # the release-line pass so long campaigns do not burn time on low-value
  # mutants.
  "crates/game_domain/src/ids.rs",
  "crates/game_domain/src/player.rs",
  "crates/game_domain/src/round.rs",
  "crates/game_domain/src/skill.rs",
  "crates/game_lobby/src/lib.rs",
  "crates/game_match/src/accessors.rs",
  "crates/game_match/src/flow.rs",
  "crates/game_match/src/types.rs",
  "crates/game_net/src/header.rs",
  "crates/game_net/src/input.rs",
  "crates/game_net/src/packet_types.rs",
  "crates/game_net/src/ingress.rs",
  "crates/game_net/src/control/client.rs",
  "crates/game_net/src/control/codec.rs",
  "crates/game_net/src/control/server_decode.rs",
  "crates/game_net/src/control/server_encode.rs",
  "crates/game_net/src/control/server_types.rs",
  "crates/game_net/src/control/snapshots_decode.rs",
  "crates/game_net/src/control/snapshots_encode.rs",
  "crates/game_api/src/app.rs",
  "crates/game_api/src/app/ingress/lobby.rs",
  "crates/game_api/src/app/ingress/match_flow.rs",
  "crates/game_api/src/app/ingress/mod.rs",
  "crates/game_api/src/app/lifecycle.rs",
  "crates/game_api/src/app/snapshots/arena.rs",
  "crates/game_api/src/app/snapshots/mod.rs",
  "crates/game_api/src/app/snapshots/visibility.rs",
  "crates/game_api/src/app/support.rs",
  "crates/game_sim/src/actions.rs",
  "crates/game_sim/src/effects.rs",
  "crates/game_sim/src/geometry.rs",
  "crates/game_sim/src/helpers.rs",
  "crates/game_sim/src/lib.rs",
  "crates/game_sim/src/ticks.rs",
]
