behaviors:
  - id: projectile
    label: Projectile
    implemented: true
    inspiration: "League skillshots and WoW missiles"
    notes: "A moving effect with speed, range, radius, and an impact payload."
    schema:
      payload: required
      allowed_effects: [skill_shot]
      numeric_fields:
        cooldown_ms: required
        cast_time_ms: optional
        mana_cost: optional
        range: required
        radius: required
        distance: forbidden
        speed: required
        impact_radius: forbidden
        duration_ms: forbidden
        hit_points: forbidden
        tick_interval_ms: forbidden
        player_speed_bps: forbidden
        projectile_speed_bps: forbidden
        cooldown_bps: forbidden
        cast_time_bps: forbidden
  - id: beam
    label: Beam
    implemented: true
