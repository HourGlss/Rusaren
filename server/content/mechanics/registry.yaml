statuses:
  - id: poison
    label: Poison
    implemented: true
    inspiration: "Rogue and assassin damage-over-time effects"
    notes: "A damaging periodic effect that stacks by source."
    schema:
      max_stacks: positive
      expire_payload: optional
      dispel_payload: optional
      numeric_fields:
        duration_ms: required
        tick_interval_ms: required
        magnitude: required
        trigger_duration_ms: forbidden
  - id: hot
    label: Heal Over Time
    implemented: true
    inspiration: "Cleric and healer maintenance spells"
    notes: "A healing periodic effect that stacks per authored source rules and can bloom on expire or dispel."
    schema:
      max_stacks: positive
      expire_payload: optional
      dispel_payload: optional
      numeric_fields:
        duration_ms: required
        tick_interval_ms: required
        magnitude: required
        trigger_duration_ms: forbidden
  - id: chill
    label: Chill
    implemented: true
    inspiration: "Mage slows that can escalate into roots"
    notes: "A stacking slow that can trigger a follow-up root."
    schema:
      max_stacks: positive
      expire_payload: optional
      dispel_payload: optional
      numeric_fields:
        duration_ms: required
        tick_interval_ms: forbidden
        magnitude: required
        trigger_duration_ms: optional
  - id: root
    label: Root
    implemented: true
    inspiration: "Snare and immobilize effects"
    notes: "Prevents movement while allowing other actions unless another status forbids them."
    schema:
      max_stacks: one
      expire_payload: optional
      dispel_payload: optional
      numeric_fields:
        duration_ms: required
        tick_interval_ms: forbidden
        magnitude: zero
        trigger_duration_ms: forbidden
  - id: haste
    label: Haste
    implemented: true
    inspiration: "Movement or action speed buffs"
    notes: "Improves movement speed for a limited duration."
    schema:
      max_stacks: one
      expire_payload: optional
      dispel_payload: optional
      numeric_fields:
        duration_ms: required
        tick_interval_ms: forbidden
        magnitude: required
        trigger_duration_ms: forbidden
  - id: silence
    label: Silence
    implemented: true
    inspiration: "Spell lockout effects"
    notes: "Prevents skill casts while active."
    schema:
      max_stacks: one
      expire_payload: optional
      dispel_payload: optional
      numeric_fields:
        duration_ms: required
        tick_interval_ms: forbidden
        magnitude: zero
        trigger_duration_ms: forbidden
  - id: stun
    label: Stun
    implemented: true
    inspiration: "Hard crowd control"
    notes: "Prevents movement and actions while active."
    schema:
      max_stacks: one
      expire_payload: optional
      dispel_payload: optional
      numeric_fields:
        duration_ms: required
        tick_interval_ms: forbidden
        magnitude: zero
        trigger_duration_ms: forbidden
  - id: sleep
    label: Sleep
    implemented: true
    inspiration: "Sap, dream control, and break-on-hit disables"
    notes: "Behaves like a stun but is removed by any incoming damage from any source."
    schema:
      max_stacks: one
      expire_payload: optional
      dispel_payload: optional
      numeric_fields:
        duration_ms: required
        tick_interval_ms: forbidden
        magnitude: zero
        trigger_duration_ms: forbidden
  - id: shield
    label: Shield
    implemented: true
    inspiration: "Priest bubbles, barriers, and absorb shields"
    notes: "Absorbs incoming damage before hit points are reduced. Multiple applications stack."
    schema:
      max_stacks: positive
      expire_payload: optional
      dispel_payload: optional
      numeric_fields:
        duration_ms: required
        tick_interval_ms: forbidden
        magnitude: required
        trigger_duration_ms: forbidden
  - id: stealth
    label: Stealth
    implemented: true
    inspiration: "Rogue invisibility and hidden movement"
    notes: "Removes the unit from enemy visibility and targeting until the unit takes damage or takes an action."
    schema:
      max_stacks: one
      expire_payload: optional
      dispel_payload: optional
      numeric_fields:
        duration_ms: required
        tick_interval_ms: forbidden
        magnitude: zero
        trigger_duration_ms: forbidden
  - id: reveal
    label: Reveal
    implemented: true
    inspiration: "Detection, flares, and anti-stealth counters"
    notes: "Temporarily exposes a stealthed unit to enemies as if it were not stealthed."
    schema:
      max_stacks: one
      expire_payload: optional
      dispel_payload: optional
      numeric_fields:
        duration_ms: required
        tick_interval_ms: forbidden
        magnitude: zero
        trigger_duration_ms: forbidden
  - id: fear
    label: Fear
    implemented: true
    inspiration: "Panic and forced retreat control"
    notes: "Forces movement directly away from the applier and blocks all actions for the duration."
    schema:
      max_stacks: one
      expire_payload: optional
      dispel_payload: optional
      numeric_fields:
        duration_ms: required
        tick_interval_ms: forbidden
        magnitude: zero
        trigger_duration_ms: forbidden
