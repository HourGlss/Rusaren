name: server-quality

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/server-quality.yml"
      - ".vscode/**"
      - "server/**"
      - "shared/docs/**"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/server-quality.yml"
      - ".vscode/**"
      - "server/**"
      - "shared/docs/**"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add clippy rustfmt llvm-tools-preview --toolchain stable

      - name: Install quality tools
        run: ./scripts/install-tools.ps1

      - name: Format
        run: ./scripts/quality.ps1 fmt

      - name: Lint
        run: ./scripts/quality.ps1 lint

      - name: Verus
        run: ./scripts/quality.ps1 verus

      - name: Feature matrix
        run: ./scripts/quality.ps1 hack

      - name: Tests
        env:
          RARENA_NEXTEST_JSON_PATH: target/reports/tests/nextest.jsonl
        run: ./scripts/quality.ps1 test

      - name: Doc tests
        run: ./scripts/quality.ps1 doc

      - name: Live ingress fuzz smoke
        env:
          RARENA_FUZZ_MAX_TOTAL_TIME: 10
        run: ./scripts/quality.ps1 fuzz-live

      - name: HTML reports
        run: ./scripts/quality.ps1 reports

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Prepare Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          New-Item -ItemType File -Force -Path target/reports/.nojekyll | Out-Null

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: server/target/reports

      - name: Dependency policy
        run: ./scripts/quality.ps1 deny

      - name: Security audit
        run: ./scripts/quality.ps1 audit

      - name: Spelling
        run: ./scripts/quality.ps1 typos

      - name: TOML formatting
        run: ./scripts/quality.ps1 taplo

      - name: GitHub Actions security
        run: ./scripts/quality.ps1 zizmor

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: server-reports-${{ github.sha }}
          path: |
            server/target/reports
            server/target/fuzz-generated-corpus
            server/fuzz/artifacts

      - name: Report summary
        if: always()
        run: |
          $testSummary = $null
          $testSummaryPath = "target/reports/tests/nextest.jsonl"
          if (Test-Path $testSummaryPath) {
            $suiteEvents = @(
              Get-Content -Path $testSummaryPath |
                Where-Object { $_ -like '{"type":"suite"*' } |
                ForEach-Object { $_ | ConvertFrom-Json }
            )
            $completedSuites = @($suiteEvents | Where-Object { $_.event -ne "started" })
            if ($completedSuites.Count -gt 0) {
              $testSummary = [pscustomobject]@{
                Tests = [int](($completedSuites | Measure-Object -Property passed -Sum).Sum + ($completedSuites | Measure-Object -Property failed -Sum).Sum + ($completedSuites | Measure-Object -Property ignored -Sum).Sum)
                Passed = [int](($completedSuites | Measure-Object -Property passed -Sum).Sum)
                Failures = [int](($completedSuites | Measure-Object -Property failed -Sum).Sum)
                Skipped = [int](($completedSuites | Measure-Object -Property ignored -Sum).Sum)
                TimeSeconds = [double](($completedSuites | Measure-Object -Property exec_time -Sum).Sum)
              }
            }
          }

          $complexitySummary = $null
          $complexitySummaryPath = "target/reports/complexity/summary.json"
          if (Test-Path $complexitySummaryPath) {
            $complexitySummary = Get-Content -Path $complexitySummaryPath -Raw | ConvertFrom-Json
          }

          $summaryLines = @(
            "## Server reports",
            "",
            "Commit: `${{ github.sha }}`",
            "Artifact: `server-reports-${{ github.sha }}`",
            "Main file inside artifact: `server/target/reports/output.html`",
            "Fuzz coverage file inside artifact: `server/target/reports/fuzz/output.html`",
            "Discovered fuzz corpus directory inside artifact: `server/target/fuzz-generated-corpus`",
            "Fuzz findings directory inside artifact: `server/fuzz/artifacts`",
            "Docs file inside artifact: `server/target/reports/docs/index.html`",
            "Docs summary file inside artifact: `server/target/reports/docs/summary.json`",
            "Docs site file inside artifact: `server/target/reports/docs/site/index.html`",
            "Rust API docs file inside artifact: `server/target/reports/rustdoc/index.html`",
            "Call graph file inside artifact: `server/target/reports/callgraph/output.html`",
            "Backend overview graph inside artifact: `server/target/reports/callgraph/backend_core.overview.simple.svg`",
            "Detailed backend graph inside artifact: `server/target/reports/callgraph/backend_core.simple.svg`",
            "Coverage file inside artifact: `server/target/reports/coverage/output.html`",
            "Complexity file inside artifact: `server/target/reports/complexity/output.html`"
          )

          if ($null -ne $testSummary) {
            $summaryLines += @(
              "",
              "## Rust test summary",
              "",
              "- Tests: $($testSummary.Tests)",
              "- Passed: $($testSummary.Passed)",
              "- Failures: $($testSummary.Failures)",
              "- Skipped: $($testSummary.Skipped)",
              "- Duration: $([math]::Round([double]$testSummary.TimeSeconds, 2))s",
              "- Structured nextest log inside artifact: `server/target/reports/tests/nextest.jsonl`"
            )
          }

          if ($null -ne $complexitySummary) {
            $worstFunctionLine = if ($null -ne $complexitySummary.worst.function) {
              "- Worst function: $($complexitySummary.worst.function.file) :: $($complexitySummary.worst.function.name) [CC $($complexitySummary.worst.function.cyclomatic), $($complexitySummary.worst.function.cyclomatic_grade)]"
            }
            else {
              "- Worst function: n/a"
            }
            $summaryLines += @(
              "",
              "## Complexity summary",
              "",
              "- Score: $($complexitySummary.score.value)/100 ($($complexitySummary.score.grade))",
              "- Runtime files: $($complexitySummary.runtime.file_count)",
              "- Runtime functions: $($complexitySummary.runtime.function_count)",
              "- Runtime files without E/F hotspots: $($complexitySummary.runtime.files_without_ef_hotspots_percent)%",
              $worstFunctionLine,
              "- Summary JSON inside artifact: `server/target/reports/complexity/summary.json`"
            )
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summaryLines -Encoding utf8

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
