name: server-quality

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/server-quality.yml"
      - ".vscode/**"
      - "server/**"
      - "shared/docs/**"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/server-quality.yml"
      - ".vscode/**"
      - "server/**"
      - "shared/docs/**"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add clippy rustfmt llvm-tools-preview --toolchain stable

      - name: Install quality tools
        run: ./scripts/install-tools.ps1

      - name: Format
        run: ./scripts/quality.ps1 fmt

      - name: Lint
        run: ./scripts/quality.ps1 lint

      - name: Verus
        run: ./scripts/quality.ps1 verus

      - name: Feature matrix
        run: ./scripts/quality.ps1 hack

      - name: Tests
        run: ./scripts/quality.ps1 test

      - name: Doc tests
        run: ./scripts/quality.ps1 doc

      - name: Fuzz target build
        run: ./scripts/quality.ps1 fuzz

      - name: HTML reports
        run: ./scripts/quality.ps1 reports

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          New-Item -ItemType File -Force -Path target/reports/.nojekyll | Out-Null

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: server/target/reports

      - name: Dependency policy
        run: ./scripts/quality.ps1 deny

      - name: Security audit
        run: ./scripts/quality.ps1 audit

      - name: Spelling
        run: ./scripts/quality.ps1 typos

      - name: TOML formatting
        run: ./scripts/quality.ps1 taplo

      - name: GitHub Actions security
        run: ./scripts/quality.ps1 zizmor

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-reports-${{ github.sha }}
          path: server/target/reports

      - name: Report summary
        if: always()
        run: |
          @"
          ## Server reports

          Commit: `${{ github.sha }}`
          Artifact: `server-reports-${{ github.sha }}`
          Main file inside artifact: `server/target/reports/output.html`
          Fuzz coverage file inside artifact: `server/target/reports/fuzz/output.html`
          Docs file inside artifact: `server/target/reports/docs/index.html`
          Docs summary file inside artifact: `server/target/reports/docs/summary.json`
          Docs site file inside artifact: `server/target/reports/docs/site/index.html`
          Rust API docs file inside artifact: `server/target/reports/rustdoc/index.html`
          Call graph file inside artifact: `server/target/reports/callgraph/output.html`
          Backend overview graph inside artifact: `server/target/reports/callgraph/backend_core.overview.simple.svg`
          Detailed backend graph inside artifact: `server/target/reports/callgraph/backend_core.simple.svg`
          Coverage file inside artifact: `server/target/reports/coverage/output.html`
          Complexity file inside artifact: `server/target/reports/complexity/output.html`
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

  deploy-pages:
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
