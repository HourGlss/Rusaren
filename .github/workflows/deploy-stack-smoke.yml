name: deploy-stack-smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/deploy-stack-smoke.yml"
      - ".dockerignore"
      - "deploy/**"
      - "server/Dockerfile"
      - "server/scripts/docker-smoke.ps1"
      - "server/bin/dedicated_server/**"
      - "server/crates/game_api/**"
      - "README.md"
      - "TODO.md"
      - "shared/docs/00_index.md"
      - "shared/docs/09_testing_ops.md"
      - "shared/docs/14_buildability_assessment.md"
      - "shared/docs/15_deployment_ops.md"
      - "shared/docs/16_runbooks.md"
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run deploy smoke script
        shell: pwsh
        run: ./server/scripts/docker-smoke.ps1 -ImageTag rusaren/server:deploy-smoke
