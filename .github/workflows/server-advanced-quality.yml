name: server-advanced-quality

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

jobs:
  advanced:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add clippy rustfmt llvm-tools-preview --toolchain stable

      - name: Install advanced tools
        run: ./scripts/install-tools.ps1 -IncludeNightly

      - name: Unused dependencies
        run: ./scripts/quality.ps1 udeps

      - name: Miri
        run: ./scripts/quality.ps1 miri

      - name: Feature matrix
        run: ./scripts/quality.ps1 hack

      - name: Complexity report
        run: ./scripts/quality.ps1 complexity

      - name: Upload advanced reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-advanced-quality
          path: server/target/quality
