name: server-advanced-quality

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  advanced:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add clippy rustfmt llvm-tools-preview --toolchain stable

      - name: Install advanced tools
        run: ./scripts/install-tools.ps1 -IncludeNightly -IncludeFuzzTools

      - name: Unused dependencies
        run: ./scripts/quality.ps1 udeps

      - name: Miri
        run: ./scripts/quality.ps1 miri

      - name: Feature matrix
        run: ./scripts/quality.ps1 hack

      - name: Complexity report
        run: ./scripts/quality.ps1 complexity

      - name: Live ingress fuzz campaign
        env:
          RARENA_FUZZ_MAX_TOTAL_TIME: 300
        run: ./scripts/quality.ps1 fuzz-live

      - name: Upload advanced reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: server-advanced-quality-${{ github.sha }}
          path: |
            server/target/reports
            server/target/fuzz-generated-corpus
            server/fuzz/artifacts
